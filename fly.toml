# Fly.io app config — deploy with: fly deploy
# First time: fly auth login && fly launch --no-deploy  (creates app), then fly deploy

app = "real-time-anomaly"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    timeout = "3s"
    path = "/"
